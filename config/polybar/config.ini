[global/wm]
include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

; Setting up the main laptop monitor
[bar/top]
monitor = eDP-1
tray-position = right
tray-padding = 0
width = 100%
height = 35
padding-left = 0
padding-right = 0
background = ${colors.background}
foreground = ${colors.foreground}
bottom = false
border-top-size = 1
border-bottom-size = 1
border-top-color = ${colors.background}
border-bottom-color = ${colors.background}
offset-x = 0%
offset-y = 0%
fixed-center = true
line-size = 3
wm-restack = bspwm

modules-left = separator bspwm
modules-center = temperature space space memory space space cpu
modules-right = battery separator pulseaudio separator xkeyboard separator time separator bluetooth separator wlan 

font-0 = JetBrainsMono Nerd Font:style=Bold:pixelsize=13;3
font-1 = JetBrainsMono Nerd Font:size=18;5
font-2 = Material Design Icons:style=Bold:size=13;3
font-3 = unifont:fontformat=truetype:size=13:antialias=true;

